<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário Final</title>
</head>

<body>
<style>
body{font-family:Arial;background:#0f172a;color:#fff}
.container{max-width:800px;margin:auto;padding:20px}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none}
button{background:#22c55e;color:#000;font-weight:bold;cursor:pointer}
</style>

<div class="container">

<h2>Ficha de Inscrição</h2>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<input id="celular" placeholder="Celular">
<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">

<input id="orgao" placeholder="Órgão emissor">
<input id="dataRg" placeholder="Data RG">
<input id="nascimento" placeholder="Nascimento">

<select id="curso">
  <option value="">Curso</option>
  <option>NR 35</option>
  <option>MOPP</option>
</select>

<select id="tipo">
  <option value="">Tipo</option>
  <option>Formação</option>
  <option>Atualização</option>
</select>

<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<input id="mae" placeholder="Mãe">
<input id="pai" placeholder="Pai">

<input id="assinatura" placeholder="Assinatura">

<button id="btn">Enviar</button>

</div>

<script>

// ===== MÁSCARAS =====

function somenteNumeros(v) {
  return v.replace(/\D/g, "");
}

function formatarCPF(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 9){
    v = v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, "$1.$2.$3-$4");
  } else if(v.length > 6){
    v = v.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
  } else if(v.length > 3){
    v = v.replace(/(\d{3})(\d+)/, "$1.$2");
  }

  el.value = v;
}

function formatarCelular(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 6){
    v = v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "($1) $2");
  }

  el.value = v;
}

function formatarData(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 4){
    v = v.replace(/(\d{2})(\d{2})(\d+)/, "$1/$2/$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "$1/$2");
  }

  el.value = v;
}

function formatarCEP(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 5){
    v = v.replace(/(\d{5})(\d+)/, "$1-$2");
  }

  el.value = v;
}

// ===== BUSCAR CEP =====

async function buscarCEP(){
  const cep = somenteNumeros(document.getElementById("cep").value);

  if(cep.length !== 8) return;

  try{
    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if(data.erro){
      alert("CEP não encontrado");
      return;
    }

    document.getElementById("endereco").value = data.logradouro;
    document.getElementById("bairro").value = data.bairro;
    document.getElementById("cidade").value = data.localidade;
    document.getElementById("estado").value = data.uf;

  } catch {
    alert("Erro ao buscar CEP");
  }
}

// ===== PEGAR DADOS =====

function get(id){
  return document.getElementById(id).value;
}

// ===== IP =====

async function getIP(){
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    const d = await r.json();
    return d.ip;
  } catch {
    return "0.0.0.0";
  }
}

// ===== ENVIO =====

document.getElementById("btn").addEventListener("click", async () => {

  if (!get("nome") || !get("cpf") || !get("email")) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  const btn = document.getElementById("btn");
  btn.innerText = "Enviando...";
  btn.disabled = true;

  const dados = {
    nome: get("nome"),
    email: get("email"),
    celular: get("celular"),
    cpf: get("cpf"),
    rg: get("rg"),
    orgao: get("orgao"),
    dataRg: get("dataRg"),
    nascimento: get("nascimento"),
    cidadeNascimento: get("cidadeNascimento"),
    curso: get("curso"),
    tipo: get("tipo"),
    sexo: get("sexo"),
    estadoCivil: get("estadoCivil"),
    cep: get("cep"),
    endereco: get("endereco"),
    numero: get("numero"),
    complemento: get("complemento"),
    bairro: get("bairro"),
    cidade: get("cidade"),
    estado: get("estado"),
    mae: get("mae"),
    pai: get("pai"),
    assinatura: get("assinatura"),
    ip: await getIP(),
    dataHora: new Date().toLocaleString()
  };

  const formData = new URLSearchParams(dados);

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbzumQY-P9irAdKmAAqhR72BIM22HMk853Wfvnj4pbijjgYL62gOBpfTLvWuiWNt5nXDCQ/exec", {
      method: "POST",
      body: formData
    });

    const text = await res.text();

    if(text.trim().toLowerCase() === "ok"){
      alert("Enviado com sucesso!");
    } else {
      alert("Erro no servidor");
    }

  } catch {
    alert("Erro de conexão");
  }

  btn.innerText = "Enviar";
  btn.disabled = false;
});

</script>
</body>
</html>
