<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário Final</title>
</head>

<body>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

header{
  background:#020617;
  padding:20px 15px;
  text-align:center;
  width:100%;
}

header h1{
  font-size:24px;
  margin-bottom:5px;
}

header p{
  font-size:14px;
  opacity:0.8;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px 15px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:100%;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:none;
  font-size:14px;
}

button{
  background:#22c55e;
  border:none;
  padding:14px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#16a34a;
}

h3{
  margin-bottom:10px;
}

label{
  display:flex;
  align-items:center;
  gap:10px;
}

#boxTermo{
  max-height:200px;
  overflow-y:auto;
  background:#0f172a;
  padding:15px;
  border-radius:6px;
  margin-bottom:10px;
}

@media (max-width:480px){
  header h1{font-size:20px;}
  header p{font-size:13px;}
  .card{padding:15px;}
}
</style>

<header>
  <h1>GRUPO 3S</h1>
  <p>Sistema de Treinamentos</p>
</header>

<div class="container">
<div class="card">

<h3>Ficha de Inscrição</h3>

<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="Email">

<input id="celular" maxlength="15" placeholder="Celular">

<select id="curso">
  <option value="">Selecione o curso</option>
  <option>Transporte Coletivo de Passageiros</option>
  <option>Transporte Escolar</option>
  <option>NR 35 - Trabalho em Altura</option>
</select>

<select id="tipo">
  <option value="">Selecione o tipo</option>
  <option>Formação</option>
  <option>Atualização</option>
</select>

<input id="cpf" maxlength="14" placeholder="CPF">
<input id="rg" placeholder="RG">
<input id="orgao" placeholder="Órgão emissor">

<input id="dataRg" maxlength="10" placeholder="Data emissão RG">
<input id="nascimento" maxlength="10" placeholder="Data nascimento">

<input id="cep" maxlength="9" placeholder="CEP">

<input id="endereco" placeholder="Endereço">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<input id="mae" placeholder="Nome da mãe">
<input id="pai" placeholder="Nome do pai">

<input id="assinatura" placeholder="Assinatura">

<button id="btn">Enviar</button>

</div>
</div>

<script>

// ===== MÁSCARAS =====

function somenteNumeros(v) {
  return v.replace(/\D/g, "");
}

function formatarCPF(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 9){
    v = v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, "$1.$2.$3-$4");
  } else if(v.length > 6){
    v = v.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
  } else if(v.length > 3){
    v = v.replace(/(\d{3})(\d+)/, "$1.$2");
  }

  el.value = v;
}

function formatarCelular(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 6){
    v = v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "($1) $2");
  }

  el.value = v;
}

function formatarData(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 4){
    v = v.replace(/(\d{2})(\d{2})(\d+)/, "$1/$2/$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "$1/$2");
  }

  el.value = v;
}

function formatarCEP(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 5){
    v = v.replace(/(\d{5})(\d+)/, "$1-$2");
  }

  el.value = v;
}

// ===== BUSCAR CEP =====

async function buscarCEP(){
  const cep = somenteNumeros(document.getElementById("cep").value);

  if(cep.length !== 8) return;

  try{
    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if(data.erro){
      alert("CEP não encontrado");
      return;
    }

    document.getElementById("endereco").value = data.logradouro;
    document.getElementById("bairro").value = data.bairro;
    document.getElementById("cidade").value = data.localidade;
    document.getElementById("estado").value = data.uf;

  } catch {
    alert("Erro ao buscar CEP");
  }
}

// ===== PEGAR DADOS =====

function get(id){
  return document.getElementById(id).value;
}

// ===== IP =====

async function getIP(){
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    const d = await r.json();
    return d.ip;
  } catch {
    return "0.0.0.0";
  }
}

// ===== ENVIO =====

document.getElementById("btn").addEventListener("click", async () => {

  if (!get("nome") || !get("cpf") || !get("email")) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  const btn = document.getElementById("btn");
  btn.innerText = "Enviando...";
  btn.disabled = true;

  const dados = {
    nome: get("nome"),
    email: get("email"),
    celular: get("celular"),
    cpf: get("cpf"),
    rg: get("rg"),
    orgao: get("orgao"),
    dataRg: get("dataRg"),
    nascimento: get("nascimento"),
    cidadeNascimento: get("cidadeNascimento"),
    curso: get("curso"),
    tipo: get("tipo"),
    sexo: get("sexo"),
    estadoCivil: get("estadoCivil"),
    cep: get("cep"),
    endereco: get("endereco"),
    numero: get("numero"),
    complemento: get("complemento"),
    bairro: get("bairro"),
    cidade: get("cidade"),
    estado: get("estado"),
    mae: get("mae"),
    pai: get("pai"),
    assinatura: get("assinatura"),
    ip: await getIP(),
    dataHora: new Date().toLocaleString()
  };

  const formData = new URLSearchParams(dados);

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbzumQY-P9irAdKmAAqhR72BIM22HMk853Wfvnj4pbijjgYL62gOBpfTLvWuiWNt5nXDCQ/exec", {
  method: "POST",
  body: formData,
  mode: "no-cors"
});



    const text = await res.text();

    if(text.trim().toLowerCase() === "ok"){
 alert("Enviado com sucesso!");

} catch (err) {
  alert("Erro de rede");
}

  } catch {
    alert("Erro de conexão");
  }

  btn.innerText = "Enviar";
  btn.disabled = false;
});

</script>

</body>
</html>
