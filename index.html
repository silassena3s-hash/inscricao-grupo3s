<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário Final</title>
</head>

<body>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
-webkit-text-size-adjust: 100%;
}

header{
  background:#020617;
  padding:20px 15px;
  text-align:center;
  width:100%;
}

header h1{
  font-size:24px;
  margin-bottom:5px;
}

header p{
  font-size:14px;
  opacity:0.8;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px 15px;
  width:100%;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:100%;
}

/* 🔥 AQUI COMEÇA A PARTE MOBILE ROBUSTA */
input, select {
  width: 100%;
  display: block;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}
button{
  background:#22c55e;
  border:none;
  padding:14px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#16a34a;
}

h3{
  margin-bottom:10px;
}

label{
  display:flex;
  align-items:center;
  gap:10px;
}

#boxTermo{
  max-height:200px;
  overflow-y:auto;
  background:#0f172a;
  padding:15px;
  border-radius:6px;
  margin-bottom:10px;
}

@media (max-width:480px){
  header h1{font-size:20px;}
  header p{font-size:13px;}
  .card{padding:15px;}
}
</style>

<header>
  <h1>GRUPO 3S</h1>
  <p>Sistema de Treinamentos</p>
</header>

<div class="container">
<div class="card">

<h3>Ficha de Inscrição</h3>

<!-- IDENTIFICAÇÃO DO REGISTRO (não precisa input) -->

<!-- DADOS PESSOAIS -->
<input id="nome" placeholder="Nome completo" onkeyup="this.value=this.value.toUpperCase()">
<input id="email" placeholder="Email">
<input id="celular" placeholder="Celular" 
onkeyup="formatarCelular(this)">
<input id="cpf" placeholder="CPF" onkeyup="this.value=formatarCPF(this.value)">
<input id="rg" placeholder="RG">
<input id="orgao" placeholder="Órgão emissor (ex: SP)">
<input type="date" id="dataRg">
<input type="date" id="nascimento">
<input id="cidadeNascimento" placeholder="Cidade de nascimento">
<select id="sexo">
  <option value="">Sexo</option>
  <option>Masculino</option>
  <option>Feminino</option>
  <option>Outros</option>
</select>

<select id="estadoCivil">
  <option value="">Estado civil</option>
  <option>Casado(a)</option>
  <option>Solteiro(a)</option>
  <option>Separado(a)</option>
  <option>Outros</option>
</select>

<input id="mae" placeholder="Nome da mãe">
<input id="pai" placeholder="Nome do pai">

<!-- ENDEREÇO -->
<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<input id="endereco" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="complemento" placeholder="Complemento">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<!-- CURSO -->
<select id="curso">
  <option value="">Selecione o curso</option>
  <option>Transporte Coletivo de Passageiros</option>
  <option>Transporte Escolar</option>
  <option>Transporte de Emergência</option>
  <option>Transporte de Produtos Perigosos (MOPP)</option>
  <option>Transporte de Cargas Indivisíveis</option>
  <option>NR 06 - EPI</option>
  <option>NR 11 - Operador de Empilhadeira</option>
  <option>NR 12 - Segurança em Máquinas</option>
  <option>NR 20 - Inflamáveis</option>
  <option>NR 35 - Trabalho em Altura</option>
  <option>Direção Defensiva</option>
  <option>Direção Defensiva + Primeiros Socorros</option>
  <option>Primeiros Socorros</option>
  <option>Logística Básica</option>
</select>

<select id="tipo">
  <option value="">Selecione o tipo</option>
  <option>Formação</option>
  <option>Atualização</option>
</select>

<!-- CNH -->
<input id="registroCNH" placeholder="Registro CNH">
<input id="categoriaCNH" placeholder="Categoria CNH">

<!-- SISTEMA -->
<input id="assinatura" placeholder="Assinatura">

<button id="btn">Enviar</button>
</div>
</div>

<script>

// ===== MÁSCARAS =====

function somenteNumeros(v) {
  return v.replace(/\D/g, "");
}

function formatarCPF(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 9){
    v = v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, "$1.$2.$3-$4");
  } else if(v.length > 6){
    v = v.replace(/(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
  } else if(v.length > 3){
    v = v.replace(/(\d{3})(\d+)/, "$1.$2");
  }

  el.value = v;
}

function formatarCelular(el){
  let v = somenteNumeros(el.value).slice(0,11);

  if(v.length > 6){
    v = v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "($1) $2");
  }

  el.value = v;
}

function formatarData(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 4){
    v = v.replace(/(\d{2})(\d{2})(\d+)/, "$1/$2/$3");
  } else if(v.length > 2){
    v = v.replace(/(\d{2})(\d+)/, "$1/$2");
  }

  el.value = v;
}

function formatarCEP(el){
  let v = somenteNumeros(el.value).slice(0,8);

  if(v.length > 5){
    v = v.replace(/(\d{5})(\d+)/, "$1-$2");
  }

  el.value = v;
}

// ===== BUSCAR CEP =====

async function buscarCEP(){
  const cep = somenteNumeros(document.getElementById("cep").value);

  if(cep.length !== 8) return;

  try{
    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if(data.erro){
      alert("CEP não encontrado");
      return;
    }

    document.getElementById("endereco").value = data.logradouro;
    document.getElementById("bairro").value = data.bairro;
    document.getElementById("cidade").value = data.localidade;
    document.getElementById("estado").value = data.uf;

  } catch {
    alert("Erro ao buscar CEP");
  }
}

// ===== PEGAR DADOS =====

function get(id){
  return document.getElementById(id).value;
}

// ===== IP =====

async function getIP(){
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    const d = await r.json();
    return d.ip;
  } catch {
    return "0.0.0.0";
  }
}

// ===== ENVIO =====

document.getElementById("btn").addEventListener("click", async () => {

  const btn = document.getElementById("btn");

  
  if (btn.disabled) return;

  if (!get("nome") || !get("cpf") || !get("email")) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  btn.innerText = "Enviando... Aguarde";
  btn.style.opacity = "0.7";
  btn.disabled = true;

  const dados = {
    dataHora: new Date().toLocaleString(),
    ip: await getIP(),

    nome: get("nome"),
    email: get("email"),
    celular: get("celular"),
    cpf: get("cpf"),
    rg: get("rg"),
    orgao: get("orgao"),
    dataRg: get("dataRg"),
    nascimento: get("nascimento"),
    cidadeNascimento: get("cidadeNascimento"),
    sexo: get("sexo"),
    estadoCivil: get("estadoCivil"),
    mae: get("mae"),
    pai: get("pai"),

    cep: get("cep"),
    endereco: get("endereco"),
    numero: get("numero"),
    complemento: get("complemento"),
    bairro: get("bairro"),
    cidade: get("cidade"),
    estado: get("estado"),

    curso: get("curso"),
    tipo: get("tipo"),

    registroCNH: get("registroCNH"),
    categoriaCNH: get("categoriaCNH"),

    assinatura: get("assinatura")
  };

  const formData = new URLSearchParams(dados);

  try {
  const res = await fetch("https://script.google.com/macros/s/AKfycbw7EShE_pVx0-Tp9OofHBuyK5NbKHEVEfrCK_O4yg51ipVYadZIEoIbWT8ggZqrt0XV5g/exec", {
    method: "POST",
    body: formData,
    mode: "cors"
  });

  const json = await res.json();

  if (json.status === "ok") {
    alert("Enviado! Abrindo PDF...");
    window.open(json.link, "_blank");
  } else {
    alert("Erro ao enviar");
  }

} catch (err) {
  alert("Erro de conexão");
}

btn.innerText = "Enviar";
btn.disabled = false;  
btn.style.opacity = "1";

});

</script>

</body>
</html>
