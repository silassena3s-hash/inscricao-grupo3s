<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário Final</title>
</head>

<body>

<header>
  <h1>GRUPO 3S</h1>
  <p>Sistema de Treinamentos</p>
</header>

<h2>Cadastro</h2>

<div class="container">
<div class="card">

<h3>Ficha de Inscrição</h3>

<input id="nome" placeholder="Nome completo">
<input id="email" placeholder="Email">
<input id="celular" placeholder="Celular">

<select id="curso">
  <option value="">Selecione o curso</option>
  <option>Transporte Coletivo de Passageiros</option>
  <option>Transporte Escolar</option>
  <option>Transporte de Emergência</option>
</select>

<select id="tipo">
  <option value="">Selecione o tipo</option>
  <option>Formação</option>
  <option>Atualização</option>
</select>

<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">
<input id="orgao" placeholder="Órgão emissor">
<input id="dataRg" placeholder="Data emissão RG">
<input id="nascimento" placeholder="Data de nascimento">
<input id="cidadeNascimento" placeholder="Cidade de nascimento">
<input id="categoriaCNH" placeholder="Categoria CNH">

<select id="sexo">
  <option value="">Sexo</option>
  <option>Masculino</option>
  <option>Feminino</option>
  <option>Outros</option>
</select>

<select id="estadoCivil">
  <option value="">Estado civil</option>
  <option>Casado(a)</option>
  <option>Solteiro(a)</option>
</select>

<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">
<input id="numero" placeholder="Número">
<input id="complemento" placeholder="Complemento">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<input id="mae" placeholder="Nome da mãe">
<input id="pai" placeholder="Nome do pai">

<input id="assinatura" placeholder="Assinatura">

<br><br>

<button id="btn">Enviar</button>

</div>
</div>

<script>
// pegar valor
function get(id){
  return document.getElementById(id).value;
}

// IP
async function getIP(){
  try {
    const r = await fetch("https://api.ipify.org?format=json");
    const d = await r.json();
    return d.ip;
  } catch {
    return "0.0.0.0";
  }
}

const btn = document.getElementById("btn");

btn.addEventListener("click", async () => {

  btn.innerText = "Enviando...";
  btn.disabled = true;

  const dados = {
    nome: get("nome"),
    email: get("email"),
    celular: get("celular"),
    cpf: get("cpf"),
    rg: get("rg"),
    orgao: get("orgao"),
    dataRg: get("dataRg"),
    nascimento: get("nascimento"),
    cidadeNascimento: get("cidadeNascimento"),
    curso: get("curso"),
    tipo: get("tipo"),
    sexo: get("sexo"),
    estadoCivil: get("estadoCivil"),
    cep: get("cep"),
    endereco: get("endereco"),
    numero: get("numero"),
    complemento: get("complemento"),
    bairro: get("bairro"),
    cidade: get("cidade"),
    estado: get("estado"),
    mae: get("mae"),
    pai: get("pai"),
    assinatura: get("assinatura"),
    ip: await getIP(),
    dataHora: new Date().toLocaleString()
  };



const formData = new URLSearchParams();

for (let key in dados) {
  formData.append(key, dados[key]);
}
try {
  const res = await fetch("https://script.google.com/macros/s/AKfycbyHzYp_qTf_n9Kucnh7HDODU5mkehkyyXf2c0XUkmDkFHQ_SIaFsGkVH1OiQyBhmSbLJg/exec", {
    method: "POST",
    body: formData
  });

  const text = await res.text();

  if (text.trim().toLowerCase() === "ok") {
    alert("Enviado com sucesso!");
  } else {
    alert("Erro no servidor: " + text);
  }

} catch (err) {
  alert("Erro de rede: " + err.message);
}

btn.innerText = "Enviar";
btn.disabled = false;

});

</script>

</body>
</html>
