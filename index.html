<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário Final</title>
</head>

<body>
<style>
body{font-family:Arial;background:#0f172a;color:#fff}
.container{max-width:800px;margin:auto;padding:20px}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none}
button{background:#22c55e;color:#000;font-weight:bold;cursor:pointer}
</style>

<div class="container">

<h2>Ficha de Inscrição</h2>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<input id="celular" placeholder="Celular">
<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">

<input id="orgao" placeholder="Órgão emissor">
<input id="dataRg" placeholder="Data RG">
<input id="nascimento" placeholder="Nascimento">

<select id="curso">
  <option value="">Curso</option>
  <option>NR 35</option>
  <option>MOPP</option>
</select>

<select id="tipo">
  <option value="">Tipo</option>
  <option>Formação</option>
  <option>Atualização</option>
</select>

<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<input id="mae" placeholder="Mãe">
<input id="pai" placeholder="Pai">

<input id="assinatura" placeholder="Assinatura">

<button id="btn">Enviar</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const $ = (id) => document.getElementById(id);

  // ===== MÁSCARAS =====
  $("cpf").addEventListener("input", e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,11);
    v = v.replace(/(\d{3})(\d)/,"$1.$2");
    v = v.replace(/(\d{3})(\d)/,"$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
    e.target.value = v;
  });

  $("celular").addEventListener("input", e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,11);

    if(v.length <= 10){
      v = v.replace(/(\d{2})(\d)/,"($1) $2");
      v = v.replace(/(\d{4})(\d)/,"$1-$2");
    } else {
      v = v.replace(/(\d{2})(\d)/,"($1) $2");
      v = v.replace(/(\d{5})(\d)/,"$1-$2");
    }

    e.target.value = v;
  });

  $("cep").addEventListener("input", e => {
    let v = e.target.value.replace(/\D/g,"").slice(0,8);
    e.target.value = v.replace(/(\d{5})(\d)/,"$1-$2");
  });

  // ===== CEP AUTO =====
  $("cep").addEventListener("blur", async () => {
    let cep = $("cep").value.replace(/\D/g,"");
    if(cep.length !== 8) return;

    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if(!data.erro){
      $("endereco").value = data.logradouro || "";
      $("bairro").value = data.bairro || "";
      $("cidade").value = data.localidade || "";
      $("estado").value = data.uf || "";
    }
  });

  // ===== IP =====
  async function getIP(){
    try {
      const r = await fetch("https://api.ipify.org?format=json");
      const d = await r.json();
      return d.ip;
    } catch {
      return "0.0.0.0";
    }
  }

  // ===== ENVIO =====
  $("btn").addEventListener("click", async () => {

    if(!$("nome").value || !$("cpf").value || !$("email").value){
      alert("Preencha os campos obrigatórios");
      return;
    }

    $("btn").innerText = "Enviando...";
    $("btn").disabled = true;

    const dados = {
      dataHora: new Date().toLocaleString(),
      nome: $("nome").value,
      email: $("email").value,
      celular: $("celular").value,
      cpf: $("cpf").value,
      rg: $("rg").value,
      orgao: $("orgao").value,
      dataRg: $("dataRg").value,
      nascimento: $("nascimento").value,
      curso: $("curso").value,
      tipo: $("tipo").value,
      cep: $("cep").value,
      endereco: $("endereco").value,
      numero: $("numero").value,
      bairro: $("bairro").value,
      cidade: $("cidade").value,
      estado: $("estado").value,
      mae: $("mae").value,
      pai: $("pai").value,
      assinatura: $("assinatura").value,
      ip: await getIP()
    };

    const form = new URLSearchParams();
    Object.keys(dados).forEach(k => form.append(k, dados[k]));

    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbyWiCs4Ou-ZYKHjYpl-H7V3wdL-h7CoxvLYq73Nh6kDez3ep4dB4leztNILXm0Rq6eZYg/exec", {
        method: "POST",
        body: form
      });

      const text = await res.text();

      if(text === "ok"){
        alert("Enviado com sucesso!");
        document.querySelectorAll("input").forEach(i => i.value = "");
      } else {
        alert("Erro: " + text);
      }

    } catch (err) {
      alert("Erro de rede: " + err.message);
    }

    $("btn").innerText = "Enviar";
    $("btn").disabled = false;
  });

});
</script>

</body>
</html>
